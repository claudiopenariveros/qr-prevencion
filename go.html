<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Redirigiendo...</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;color:#e8e8f0;font-family:Arial,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center}
.wrap{padding:40px 20px}
.spinner{width:30px;height:30px;border:3px solid #2a2a3d;border-top-color:#F6931E;border-radius:50%;animation:spin .6s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
p{font-size:13px;color:#6b6b8a}
a{color:#06b6d4}
</style>
</head>
<body>
<div class="wrap">
  <div class="spinner"></div>
  <p id="msg">Redirigiendo...</p>
</div>
<script>
const B = 'https://vvzyrugtmyrnnhhqxwoo.supabase.co/rest/v1';
const K = 'sb_publishable_LP4N8V3hpdwNkKdtiHXU5A_saj4FDf1';
const H = { 'apikey': K, 'Authorization': 'Bearer ' + K };
const id = new URLSearchParams(location.search).get('id');

if (!id) {
  document.getElementById('msg').textContent = 'ID no encontrado';
} else {
  // Fetch and redirect as fast as possible
  fetch(B + '/qrcodes?id=eq.' + id + '&select=url,scans', { headers: H })
    .then(r => r.json())
    .then(d => {
      if (!d.length) { document.getElementById('msg').innerHTML = 'QR no encontrado. <a href="./">Volver</a>'; return; }
      // Redirect immediately
      location.replace(d[0].url);
      // Count scan in background (fire and forget)
      fetch(B + '/qrcodes?id=eq.' + id, {
        method: 'PATCH',
        headers: { ...H, 'Content-Type': 'application/json' },
        body: '{"scans":' + ((d[0].scans || 0) + 1) + '}'
      }).catch(() => {});
    })
    .catch(() => { document.getElementById('msg').innerHTML = 'Error. <a href="./">Volver</a>'; });
}
</script>
</body>
</html>
